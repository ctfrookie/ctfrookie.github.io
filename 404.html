<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重大事件：404</title>
    <script charset="UTF-8" id="LA_COLLECT" src="//sdk.51.la/js-sdk-pro.min.js"></script>
    <script>
        LA.init({
            id: "3HQbQtTptnnrcizP",
            ck: "3HQbQtTptnnrcizP"
        })
    </script>
    <style>
        @font-face {
            font-family: 'JetBrains Mono';
            src: local('JetBrains Mono'), url('/font/JetBrainsMono-Regular.woff2') format('woff2');
        }
        
        html,
        body {
            height: 100%;
            margin: 0;
            color: #00FFFF;
            /* 蓝色文字 */
            background-color: #020024;
            /* 深蓝色背景 */
        }
        
        main {
            text-align: center;
            padding-top: 20%;
        }
        
        #logo {
            vertical-align: middle;
            display: inline-block;
        }
        
        #logo img {
            width: 300px;
            filter: hue-rotate(180deg) brightness(0.8);
            /* 调整图片色调为蓝色 */
        }
        
        #error {
            vertical-align: middle;
            display: inline-block;
        }
        
        #error a {
            color: #00BFFF;
            /* 浅蓝色链接 */
            padding: 3px 10px;
            font-size: larger;
            text-decoration: none;
            border: 1px solid #00BFFF;
            /* 链接边框 */
        }
        
        #error a:hover {
            color: #000;
            background-color: #00BFFF;
        }
        
        h1 {
            font-size: 60px;
            color: #00BFFF;
            /* 蓝色标题 */
        }
        
        h2 {
            font-size: 32px;
            font-family: 'JetBrains Mono', monospace;
            color: #00FFFF;
            /* 蓝色副标题 */
        }
        
        @media (max-width: 768px) {
            #logo img {
                width: auto;
                height: 380px;
                opacity: .23;
                position: fixed;
                bottom: -30px;
                left: -38%;
                pointer-events: none;
            }
        }
    </style>
</head>

<body>
    <main>
        <a id="logo" href="/">
            <img src="https://ak.hypergryph.com/assets/index/images/ak/pc/faction/1.png" alt="to home" />
        </a>
        <div id="error">
            <h1>重大事件：404</h1>
            <h2 style="text-align: left;">404 NOT FOUND</h2>
            <h2><span id="ip"></span></h2>
            <p style="text-align: left;">
                <a href="/">首页</a>
                <a onClick="history.back();">上一页</a>
            </p>
        </div>
    </main>
    <script>
        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'https://myip.ipip.net/json', true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState == 4) {
                var response = JSON.parse(xhr.responseText);
                if (response.ret === "ok") {
                    var ipData = response.data;
                    var ipInfo = "IP: " + ipData.ip + "<br>" +
                        "Location: " + ipData.location.join(', ');
                    document.getElementById("ip").innerHTML = ipInfo;
                } else {
                    console.error('There was a problem with the request.');
                }
            }
        };
        xhr.send();
    </script>
</body>

</html>
